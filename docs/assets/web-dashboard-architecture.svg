<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Huntrix web dashboard architecture</title>
  <desc id="desc">A browser polls the Next.js state API, renders the office floor plan, charts, alerts, AI coach, and optional InstantDB-backed snapshots.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#111827"/>
    </marker>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <style>
      .panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.client{fill:#ecfdf5;stroke:#059669;stroke-width:2}.server{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}.data{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.alert{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.title{font:700 28px system-ui,sans-serif;fill:#0f172a}.h{font:700 17px system-ui,sans-serif;fill:#0f172a}.b{font:500 14px system-ui,sans-serif;fill:#475569}.s{font:700 12px system-ui,sans-serif;fill:#334155;letter-spacing:.03em}.line{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" rx="30" fill="url(#bg)"/>
  <text x="60" y="74" class="title">Web Dashboard Runtime</text>
  <text x="60" y="104" class="b">Every visual surface reads the same EnergyState contract from the Next.js backend.</text>

  <rect class="panel" x="55" y="150" width="265" height="390" rx="22"/>
  <text x="90" y="192" class="h">Next.js pages</text>
  <rect class="client" x="85" y="220" width="205" height="48" rx="13"/><text x="108" y="250" class="b">/ floor plan + meters</text>
  <rect class="client" x="85" y="285" width="205" height="48" rx="13"/><text x="108" y="315" class="b">/devices registry</text>
  <rect class="client" x="85" y="350" width="205" height="48" rx="13"/><text x="108" y="380" class="b">/analytics charts</text>
  <rect class="client" x="85" y="415" width="205" height="48" rx="13"/><text x="108" y="445" class="b">/alerts timeline</text>
  <rect class="client" x="85" y="480" width="205" height="48" rx="13"/><text x="108" y="510" class="b">/hardware preview</text>

  <rect class="data" x="405" y="255" width="220" height="105" rx="18"/>
  <text x="438" y="295" class="h">useEnergyState</text>
  <text x="438" y="324" class="b">polls every 1.5s</text>

  <rect class="server" x="710" y="210" width="230" height="105" rx="18"/>
  <text x="743" y="250" class="h">GET /api/state</text>
  <text x="743" y="279" class="b">fresh no-store response</text>
  <rect class="server" x="710" y="375" width="230" height="105" rx="18"/>
  <text x="743" y="415" class="h">GET /api/ai-insight</text>
  <text x="743" y="444" class="b">OpenRouter + fallback</text>

  <rect class="data" x="1015" y="145" width="215" height="92" rx="18"/>
  <text x="1048" y="183" class="h">Simulator</text>
  <text x="1048" y="211" class="b">15 devices, Dhaka clock</text>
  <rect class="alert" x="1015" y="285" width="215" height="92" rx="18"/>
  <text x="1048" y="323" class="h">Alert rules</text>
  <text x="1048" y="351" class="b">after-hours, all-on, load</text>
  <rect class="data" x="1015" y="425" width="215" height="92" rx="18"/>
  <text x="1048" y="463" class="h">InstantDB snapshot</text>
  <text x="1048" y="491" class="b">optional cache</text>

  <path class="line" d="M320 345 H390"/>
  <path class="line" d="M625 307 H695"/>
  <path class="line" d="M940 262 C970 220 985 195 1000 191"/>
  <path class="line" d="M940 300 C975 315 990 327 1000 331"/>
  <path class="line" d="M940 440 H1000"/>
  <path class="line" d="M825 315 V360"/>
  <text x="348" y="327" class="s">live hook</text>
  <text x="644" y="289" class="s">fetch</text>
  <text x="952" y="247" class="s">build</text>
  <text x="954" y="316" class="s">rules</text>
  <text x="950" y="420" class="s">sync</text>
</svg>
