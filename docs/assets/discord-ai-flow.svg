<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Huntrix Discord bot and AI response flow</title>
  <desc id="desc">Discord commands are parsed by the Huntrix bot, grounded in the shared backend state, optionally humanized by OpenRouter, and sent back as Discord markdown.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#111827"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.lane{fill:#fff;stroke:#cbd5e1;stroke-width:2}.bot{fill:#ecfdf5;stroke:#059669;stroke-width:2}.api{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}.ai{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.alert{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.title{font:700 28px system-ui,sans-serif;fill:#0f172a}.h{font:700 17px system-ui,sans-serif;fill:#0f172a}.b{font:500 14px system-ui,sans-serif;fill:#475569}.s{font:700 12px system-ui,sans-serif;fill:#334155;letter-spacing:.03em}.line{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:3;fill:none;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720" rx="30"/>
  <text x="60" y="74" class="title">Discord Bot Command Flow</text>
  <text x="60" y="104" class="b">The bot never invents data. It fetches live backend facts, then optionally asks the LLM only for wording.</text>

  <rect class="lane" x="65" y="160" width="190" height="410" rx="22"/><text x="105" y="205" class="h">Discord user</text>
  <rect class="bot" x="92" y="245" width="136" height="76" rx="16"/><text x="115" y="276" class="h">!status</text><text x="115" y="300" class="b">or room/usage</text>

  <rect class="lane" x="320" y="160" width="235" height="410" rx="22"/><text x="360" y="205" class="h">Huntrix bot</text>
  <rect class="bot" x="355" y="245" width="165" height="76" rx="16"/><text x="382" y="276" class="h">Parse command</text><text x="382" y="300" class="b">prefix + args</text>
  <rect class="bot" x="355" y="380" width="165" height="76" rx="16"/><text x="382" y="411" class="h">Fallback text</text><text x="382" y="435" class="b">always available</text>

  <rect class="lane" x="620" y="160" width="225" height="410" rx="22"/><text x="660" y="205" class="h">Backend API</text>
  <rect class="api" x="650" y="245" width="165" height="76" rx="16"/><text x="677" y="276" class="h">GET /api/state</text><text x="677" y="300" class="b">live EnergyState</text>
  <rect class="alert" x="650" y="380" width="165" height="76" rx="16"/><text x="677" y="411" class="h">Alert polling</text><text x="677" y="435" class="b">new alert ids</text>

  <rect class="lane" x="910" y="160" width="300" height="410" rx="22"/><text x="955" y="205" class="h">Response layer</text>
  <rect class="ai" x="945" y="245" width="205" height="76" rx="16"/><text x="975" y="276" class="h">OpenRouter</text><text x="975" y="300" class="b">natural Discord markdown</text>
  <rect class="alert" x="945" y="380" width="205" height="76" rx="16"/><text x="975" y="411" class="h">Alert channel</text><text x="975" y="435" class="b">proactive notification</text>

  <path class="line" d="M228 283 H340"/>
  <path class="line" d="M520 283 H635"/>
  <path class="line" d="M815 283 H930"/>
  <path class="dash" d="M945 321 C820 520 430 520 228 321"/>
  <path class="line" d="M815 418 H930"/>
  <path class="dash" d="M650 456 C535 540 315 520 228 321"/>
  <text x="262" y="265" class="s">message</text>
  <text x="553" y="265" class="s">fetch facts</text>
  <text x="845" y="265" class="s">humanize</text>
  <text x="582" y="548" class="s">reply is grounded in live state</text>
</svg>
